<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #4CAF50; color: white; padding: 1rem 0; position: fixed; width: 100%; top: 0; }
        nav ul { list-style: none; display: flex; justify-content: center; }
        nav li { margin: 0 1rem; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .hero { background: #f4f4f4; padding: 100px 20px 50px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        section { padding: 60px 0; }
        #about { background: #e9e9e9; }
        footer { background: #333; color: white; text-align: center; padding: 20px; }
        h1, h2 { margin-bottom: 1rem; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        @media (max-width: 768px) { nav ul { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <h1>Welcome to My Website</h1>
            <p>Built with pure HTML and CSS for free. Customize it however you like!</p>
            <button>Get Started</button>
        </div>
    </section>

    <section id="about">
        <div class="container">
            <h2>About Me</h2>
            <p>This is a sample about section. Add your bio, images, or content here. It's fully responsive for mobile devices.</p>
        </div>
    </section>

    <footer id="contact">
        <div class="container">
            <p>&copy; 2026 My Website. Made with HTML.</p>
        </div>
    </footer>
</body>
</html>
